name: CI - Feetech Driver

on:
  push:
    branches: [ "main", "dev", "feat/**", "bugfix/**" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential cppcheck

    - name: Static Analysis (Cppcheck)
      run: |
        cppcheck --enable=warning,style,performance,portability \
                 --inline-suppr --std=c11 --force \
                 -I Lib/STS_Servo/Inc Lib/STS_Servo/Src/ --error-exitcode=1

    - name: Build and Test
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Debug
        cmake --build build
        cd build && ctest --output-on-failure

  deploy-docs:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Doxygen
        run: sudo apt-get update && sudo apt-get install -y doxygen cmake

      - name: Generate Documentation
        run: |
          cmake -B build
          cmake --build build --target docs

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './build/html'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4