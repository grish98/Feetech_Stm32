name: CI - Feetech Driver

on:
  push:
    branches: [ "main", "dev", "feat/**", "bugfix/**" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential cppcheck # Removed Doxygen here

    - name: Static Analysis (Cppcheck)
      run: |
        cppcheck --enable=warning,style,performance,portability \
                 --inline-suppr --std=c11 --force \
                 -I Lib/STS_Servo/Inc Lib/STS_Servo/Src/ --error-exitcode=1

    - name: Build and Test
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Debug
        cmake --build build
        cd build && ctest --output-on-failure

  deploy-docs:
    runs-on: ubuntu-latest
    needs: build-and-test # Ensured docs only deploy if tests pass
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install Doxygen
        run: sudo apt-get update && sudo apt-get install -y doxygen cmake

      - name: Generate and Deploy
        run: |
          cmake -B build
          cmake --build build --target docs
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/html